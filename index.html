<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>빛밤 피드 메이커</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f5f6fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        h1 {
            color: #2f3640;
            font-size: 26px;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
        }

        /* 좌측 입력창과 우측 미리보기를 가로로 정렬해주는 메인 워크스페이스 컨테이너 */
        .workspace-container {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            justify-content: center;
            gap: 40px;
            width: 100%;
            max-width: 1050px; 
            box-sizing: border-box;
        }

        /* Control Panel Styles */
        .control-panel {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 35px;
            width: 100%;
            max-width: 440px;
            box-sizing: border-box;
            flex-shrink: 0; 
        }

        .control-group {
            margin-bottom: 18px;
        }

        .control-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 14px;
            color: #353b48;
        }

        .control-group input[type="text"], .control-group input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #c8d6e5;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 14px;
            transition: border 0.2s;
        }

        /* [변경] 본문, 댓글, 답글 입력창(textarea)이 세로로만 늘어나도록 정밀 지정 */
        .control-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #c8d6e5;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 14px;
            transition: border 0.2s;
            resize: vertical; /* 가로 확장 원천 차단, 오직 세로 조절만 허용 */
            min-height: 60px;  /* 최소 높이 지정으로 UI 깨짐 방지 */
        }

        .control-group input:focus, .control-group textarea:focus {
            border-color: #54a0ff;
            outline: none;
        }

        /* Profile Upload Zone */
        .profile-upload-zone {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .mini-preview {
            width: 45px;
            height: 45px;
            border-radius: 4px;
            background-color: #dfe6e9;
            background-image: url('https://via.placeholder.com/50');
            background-size: cover;
            background-position: center;
            border: 1px solid #b2bec3;
            flex-shrink: 0;
        }

        .post-image-upload-zone {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* Crop Modal Styles */
        .crop-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .crop-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .crop-container {
            max-height: 320px;
            margin-bottom: 15px;
            overflow: hidden;
            background: #eee;
        }

        .crop-container img {
            max-width: 100%;
        }

        .crop-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-sub {
            background-color: #718093 !important;
            box-shadow: 0 4px 6px rgba(113, 128, 147, 0.2) !important;
        }

        .btn-reset {
            background-color: #e67e22 !important;
            box-shadow: 0 4px 6px rgba(230, 126, 34, 0.2) !important;
        }

        .btn-danger {
            width: auto !important;
            padding: 10px 15px !important;
            background-color: #e74c3c !important;
            color: #ffffff !important; 
            box-shadow: 0 4px 6px rgba(231, 76, 60, 0.2) !important;
            font-size: 13px !important;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* 이미지 저장하기 버튼 스타일 */
        button {
            width: 100%;
            padding: 14px;
            background-color: #FFBEBE; 
            color: #2f3640; 
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(255, 190, 190, 0.4);
        }

        button:hover {
            background-color: #ffaAAA; 
        }
        button:active {
            transform: scale(0.99);
        }

        /* 우측 미리보기 전용 정렬 영역 */
        .preview-side-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            flex-grow: 1; 
        }

        .preview-title {
            font-weight: 700;
            color: #718093;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            text-align: left; 
        }

        /* Preview Container Frame */
        .preview-container {
            background: #ffffff;
            padding: 0;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            overflow: hidden;
            display: inline-block;
            width: 100%;
            max-width: 500px; 
            box-sizing: border-box;
            height: auto; 
            margin-bottom: 25px;
        }

        /* Capture Base Element */
        #capture-area {
            width: 1000px; 
            height: auto; 
            background-color: #FAFAFA;
            padding: 60px 48px 60px 48px;
            box-sizing: border-box;
            transform-origin: top left;
            margin-bottom: 0; 
        }

        /* Main Post Layout */
        .main-post {
            display: flex;
            gap: 34px;
            position: relative;
            margin-bottom: 24px;
        }

        .profile-img {
            width: 122px;
            height: 122px;
            border-radius: 10px;
            background-color: #dfe6e9;
            background-image: url('https://via.placeholder.com/150'); 
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }

        .post-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .author-name {
            color: #6C7BA5;
            font-weight: 400;
            font-size: 40px;
            margin: 0 0 11px 0;
            min-height: 45px;
        }

        .post-text {
            color: #5B5B5B;
            font-size: 36px;
            line-height: 1.3;
            margin: 0;
            white-space: pre-wrap;
        }

        /* Attached Image Frame */
        .post-attached-image-container {
            display: none; 
            margin-left: 156px; 
            margin-bottom: 24px; 
            width: calc(100% - 156px);
            border-radius: 12px;
            overflow: hidden;
        }

        .post-attached-image-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Interaction Icons */
        .interaction-icons {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 34px;
            margin-top: -10px;    
            margin-bottom: 18px;  
            padding-right: 12px;
        }

        .icon-heart {
            width: 68px;
            height: 68px; 
            transition: all 0.1s ease;
        }

        .icon-heart.outline-style {
            fill: none !important;
            stroke: #5B5B5B !important;
            stroke-width: 0.5px !important;
        }

        .icon-heart.fill-style {
            fill: #FF8897 !important;
            stroke: none !important;
            stroke-width: 0 !important;
        }

        #view-main-heart path {
            vector-effect: non-scaling-stroke;
        }

        .icon-comment {
            width: 64px;
            height: 64px; 
        }

        /* Comment Box Layout */
        .comment-box {
            background-color: #F0F0F0;
            border-radius: 12px;
            padding: 6px 38px 30px 28px;
            font-size: 35px;
            margin-left: 156px; 
        }

        .comment-item.first-comment {
            text-align: left;
            margin-top: 10px; 
        }

        /* 댓글 간 사이 간격 최적화 수치 유지 (7px) */
        .comment-item.second-reply {
            text-align: left;
            margin-top: 7px; 
        }

        .comment-header {
            display: flex;
            align-items: center;
            gap: 15px;
            min-height: 0;
        }

        .comment-heart {
            font-size: 32px;
            color: #6C7BA5;
        }

        .comment-user {
            font-weight: 400;
            color: #6C7BA5;
        }

        .comment-body {
            color: #5B5B5B;
            line-height: 1.25;
            white-space: pre-wrap;
            margin: 0;
            padding: 0;
        }

        .reply-user {
            font-weight: 400;
            color: #6C7BA5;
        }

        .reply-text-center {
            color: #5B5B5B;
            font-weight: 400;
        }

        .unofficial-notice {
            text-align: right;
            color: #BCBCBC;
            font-size: 22px;
            font-weight: 400;
            margin-top: 50px;
            padding-right: 12px;
            letter-spacing: -0.5px;
        }

        /* 반응형 모바일 및 화면 너비가 좁은 환경 환경 레이아웃 스위칭 대응 */
        @media (max-width: 930px) {
            .workspace-container {
                flex-direction: column;
                align-items: center;
            }
            .control-panel, .preview-side-zone {
                max-width: 500px;
            }
            .preview-title {
                text-align: center;
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>

    <h1>빛밤 피드 메이커</h1>
    <div class="subtitle">문제될 시 삭제. 링크 외부 유출 금지. 업로드 시 하단 비공식 워터마크는 지우지 말아주세요ㅜ.ㅜ</div>

    <div class="workspace-container">
        
        <div class="control-panel">
            <div class="control-group">
                <label>0. 프로필 사진 업로드 (크롭 가능)</label>
                <div class="profile-upload-zone">
                    <div class="mini-preview" id="mini-profile-preview"></div>
                    <input type="file" id="input-profile-img" accept="image/*" onchange="initProfileCropper(event)">
                </div>
            </div>
            <div class="control-group">
                <label>1. 피드 작성자 이름</label>
                <input type="text" id="input-name" value="" placeholder="이름을 입력하세요" oninput="updateText()">
            </div>
            <div class="control-group">
                <label>2. 피드 내용</label>
                <textarea id="input-text" rows="2" placeholder="피드 본문 내용을 입력하세요" oninput="updateText()"></textarea>
            </div>
            <div class="control-group">
                <label>2.5 피드 이미지 첨부 (크롭 가능/자유 비율)</label>
                <div class="post-image-upload-zone">
                    <input type="file" id="input-post-attached-image" accept="image/*" onchange="initPostCropper(event)">
                    <button class="btn-danger" onclick="removePostImage()">이미지 삭제</button>
                </div>
            </div>
            <div class="control-group">
                <label>3. 댓글 작성자 / 본문</label>
                <input type="text" id="input-c1-user" value="" placeholder="댓글 작성자 이름" oninput="updateText()" style="margin-bottom:5px;">
                <textarea id="input-c1-text" rows="2" placeholder="댓글 내용을 입력하세요" oninput="updateText()"></textarea>
            </div>
            <div class="control-group">
                <label>4. 답글 본문</label>
                <textarea id="input-c2-text" rows="3" placeholder="답글 내용을 입력하세요" oninput="updateText()"></textarea>
            </div>
            <div class="control-group">
                <label>5. 좋아요한 사람</label>
                <input type="text" id="input-heart-user" placeholder="비울 수 있음" oninput="updateText()">
            </div>
            <button onclick="downloadImage()">이미지 저장하기</button>
        </div>

        <div class="preview-side-zone">
            <div class="preview-title">미리보기</div>
            <div class="preview-container" id="container-frame">
                <div id="capture-area">
                    
                    <div class="main-post">
                        <div class="profile-img" id="view-profile-img"></div>
                        <div class="post-content">
                            <p class="author-name" id="view-name"></p>
                            <p class="post-text" id="view-text"></p>
                        </div>
                    </div>

                    <div class="post-attached-image-container" id="view-post-attached-image-container">
                        <img id="view-post-attached-image" src="">
                    </div>

                    <div class="interaction-icons">
                        <svg class="icon-heart outline-style" id="view-main-heart" viewBox="0 0 24 24">
                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                        <svg class="icon-comment" viewBox="0 0 24 24" fill="#FF8897">
                            <path d="M11 2C5.48 2 1 6.48 1 12s4.48 10 10 10c1.82 0 3.53-.49 5.01-1.34L21.5 22c.36.11.71-.23.6-.6l-1.34-5.49C21.51 15.53 22 13.82 22 12c0-5.52-4.48-10-10-10z"/>
                        </svg>
                    </div>

                    <div class="comment-box">
                        <div class="comment-header" id="view-comment-header" style="display: none; margin-bottom: 14px;">
                            <span class="comment-heart">♡</span> 
                            <span class="comment-user" id="view-heart-user"></span>
                        </div>

                        <div class="comment-item first-comment">
                            <div class="comment-body"><span class="reply-user" id="view-c1-user"></span><span id="view-c1-delimiter" style="display:none;">: </span><span id="view-c1-text"></span></div>
                        </div>
                        
                        <div class="comment-item second-reply" id="view-c2-item">
                            <div class="comment-body"><span class="reply-user" id="view-reply-from"></span><span class="reply-text-center" id="view-reply-center" style="display:none;">답장</span><span class="reply-user" id="view-reply-to"></span><span id="view-c2-delimiter" style="display:none;">: </span><span id="view-c2-text"></span></div>
                        </div>
                    </div>

                    <div class="unofficial-notice">*이 이미지는 비공식 이미지입니다.</div>

                </div>
            </div>
        </div>

    </div> <div class="crop-modal" id="profileCropModal">
        <div class="crop-content">
            <h3>프로필 이미지 자르기 (1:1 고정)</h3>
            <div class="crop-container">
                <img id="profileCropImage" src="">
            </div>
            <div class="crop-buttons">
                <button class="btn-reset" onclick="resetProfileCropper()">초기화</button>
                <button class="btn-sub" onclick="closeProfileModal()">취소</button>
                <button onclick="cropAndApplyProfile()">자르기 완료</button>
            </div>
        </div>
    </div>

    <div class="crop-modal" id="postCropModal">
        <div class="crop-content">
            <h3>피드 이미지 자르기 (자유 비율)</h3>
            <div class="crop-container">
                <img id="postCropImage" src="">
            </div>
            <div class="crop-buttons">
                <button class="btn-reset" onclick="resetPostCropper()">초기화</button>
                <button class="btn-sub" onclick="closePostModal()">취소</button>
                <button onclick="cropAndApplyPost()">자르기 완료</button>
            </div>
        </div>
    </div>

    <script>
        const captureArea = document.getElementById('capture-area');
        const containerFrame = document.getElementById('container-frame');
        let profileCropper = null;
        let postCropper = null;

        function updateResponsiveScale() {
            const currentContainerWidth = containerFrame.clientWidth;
            const calculatedScale = currentContainerWidth / 1000;
            const originalHeight = captureArea.scrollHeight;
            
            captureArea.style.transform = `scale(${calculatedScale})`;
            captureArea.style.marginBottom = `-${originalHeight * (1 - calculatedScale)}px`;
            containerFrame.style.height = `${(originalHeight * calculatedScale)}px`; 
        }

        const resizeObserver = new ResizeObserver(() => {
            updateResponsiveScale();
        });
        resizeObserver.observe(containerFrame); 
        resizeObserver.observe(captureArea);

        window.addEventListener('resize', updateResponsiveScale);
        window.addEventListener('load', updateResponsiveScale);

        function initProfileCropper(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const imageEl = document.getElementById('profileCropImage');
                imageEl.src = e.target.result;
                document.getElementById('profileCropModal').style.display = 'flex';
                
                if (profileCropper) { profileCropper.destroy(); }
                profileCropper = new Cropper(imageEl, {
                    aspectRatio: 1, 
                    viewMode: 1,
                    autoCropArea: 1,
                    background: false
                });
            };
            reader.readAsDataURL(file);
        }

        function resetProfileCropper() {
            if (profileCropper) profileCropper.reset();
        }

        function cropAndApplyProfile() {
            if (!profileCropper) return;
            const canvas = profileCropper.getCroppedCanvas({ width: 350, height: 350 });
            const croppedImgUrl = `url('${canvas.toDataURL('image/png')}')`;
            document.getElementById('view-profile-img').style.backgroundImage = croppedImgUrl;
            document.getElementById('mini-profile-preview').style.backgroundImage = croppedImgUrl;
            closeProfileModal();
            setTimeout(updateResponsiveScale, 50);
        }

        function closeProfileModal() {
            document.getElementById('profileCropModal').style.display = 'none';
            document.getElementById('input-profile-img').value = '';
        }

        function initPostCropper(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const imageEl = document.getElementById('postCropImage');
                imageEl.src = e.target.result;
                document.getElementById('postCropModal').style.display = 'flex';
                
                if (postCropper) { postCropper.destroy(); }
                postCropper = new Cropper(imageEl, {
                    viewMode: 1,
                    autoCropArea: 1,
                    background: false
                });
            };
            reader.readAsDataURL(file);
        }

        function resetPostCropper() {
            if (postCropper) postCropper.reset();
        }

        function cropAndApplyPost() {
            if (!postCropper) return;
            const canvas = postCropper.getCroppedCanvas(); 
            const imgTag = document.getElementById('view-post-attached-image');
            
            imgTag.src = canvas.toDataURL('image/png');
            document.getElementById('view-post-attached-image-container').style.display = 'block';
            
            imgTag.onload = function() {
                updateResponsiveScale();
            };
            
            closePostModal();
        }

        function closePostModal() {
            document.getElementById('postCropModal').style.display = 'none';
        }

        function removePostImage() {
            document.getElementById('input-post-attached-image').value = ''; 
            document.getElementById('view-post-attached-image').src = ''; 
            document.getElementById('view-post-attached-image-container').style.display = 'none'; 
            setTimeout(updateResponsiveScale, 30); 
        }

        function updateText() {
            const name = document.getElementById('input-name').value;
            const text = document.getElementById('input-text').value;
            const c1User = document.getElementById('input-c1-user').value;
            const c1Text = document.getElementById('input-c1-text').value;
            const c2Text = document.getElementById('input-c2-text').value;
            const heartUser = document.getElementById('input-heart-user').value;

            document.getElementById('view-name').innerText = name;
            document.getElementById('view-text').innerText = text;
            document.getElementById('view-c1-user').innerText = c1User;
            document.getElementById('view-c1-text').innerText = c1Text;
            document.getElementById('view-c2-text').innerText = c2Text;
            document.getElementById('view-heart-user').innerText = heartUser;
            
            document.getElementById('view-reply-from').innerText = name;
            document.getElementById('view-reply-to').innerText = c1User;

            const mainHeartSvg = document.getElementById('view-main-heart');
            const heartHeader = document.getElementById('view-comment-header');
            
            if (heartUser.trim() === "") {
                mainHeartSvg.className.baseVal = "icon-heart outline-style";
                heartHeader.style.setProperty("display", "none", "important");
                heartHeader.style.marginBottom = '0px';
            } else {
                mainHeartSvg.className.baseVal = "icon-heart fill-style";
                heartHeader.style.setProperty("display", "flex", "important");
                heartHeader.style.marginBottom = '14px'; 
            }

            if (c1User || c1Text) {
                document.getElementById('view-c1-delimiter').style.display = 'inline';
            } else {
                document.getElementById('view-c1-delimiter').style.display = 'none';
            }

            if (name && c1User && c2Text) {
                document.getElementById('view-reply-center').style.display = 'inline';
            } else {
                document.getElementById('view-reply-center').style.display = 'none';
            }

            if (c2Text) {
                document.getElementById('view-c2-delimiter').style.display = 'inline';
            } else {
                document.getElementById('view-c2-delimiter').style.display = 'none';
            }
            
            setTimeout(updateResponsiveScale, 10);
        }

        function downloadImage() {
            resizeObserver.unobserve(captureArea);
            window.removeEventListener('resize', updateResponsiveScale);
            
            captureArea.style.transform = 'none';
            captureArea.style.marginBottom = '0';
            
            html2canvas(captureArea, { 
                scale: 1, 
                useCORS: true, 
                logging: false,
                allowTaint: true
            }).then(canvas => {
                const imgDataUrl = canvas.toDataURL('image/png');
                
                const link = document.createElement('a');
                link.download = 'LN_feed.png';
                link.href = imgDataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                window.addEventListener('resize', updateResponsiveScale);
                resizeObserver.observe(captureArea);
                updateResponsiveScale();
            });
        }

        window.addEventListener('DOMContentLoaded', updateText);
    </script>
</body>
</html>
